<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SISMAT — Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/mobile.css') }}">
</head>
<body style="padding:0;">

<div class="login-mobile-wrap">
  <div class="login-mobile-card">

    <div class="login-mobile-brasao">
      <img src="{{ url_for('static', filename='img/BrasaoSISMAT.png') }}" alt="Brasão SISMAT">
    </div>
    <div class="login-mobile-title">SISMAT</div>
    <div class="login-mobile-sub">Controle de Material · Bia C AD/5</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash-mobile {{ category if category in ['success','error','warning'] else 'error' }}" style="margin-bottom:14px;">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.login') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="form-group-mobile">
        <label for="login">Usuário</label>
        <input class="input-mobile" type="text" id="login" name="login"
               value="{{ login_str or '' }}"
               autocomplete="username" autocapitalize="none" required>
      </div>

      <div class="form-group-mobile">
        <label for="senha">Senha</label>
        <input class="input-mobile" type="password" id="senha" name="senha"
               autocomplete="current-password" required>
      </div>

      <button type="submit" class="btn-mobile btn-primary" style="margin-top:8px;">
        &#128274; Entrar
      </button>
    </form>

    <p style="text-align:center; margin-top:16px; font-size:12px; color:#9ca3af;">
      Sistema offline &middot; senhas com hash bcrypt
    </p>
  </div>
</div>

</body>
</html>
